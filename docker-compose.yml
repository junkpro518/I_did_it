services:
  bot:
    build: .
    image: i_did_it:latest
    container_name: i_did_it_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TIMEZONE:-Asia/Riyadh}
    stop_grace_period: 30s

    read_only: true
    tmpfs:
      - /tmp

    volumes:
      - reminders_data:/app/data

    networks:
      - i_did_it_internal

    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.2'

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  i_did_it_internal:
    driver: bridge

volumes:
  reminders_data:
